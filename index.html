<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REHAN ADMIN | Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Geist', sans-serif; }
        body { background: #0b0b0f; color: #fff; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 900px) { .grid { grid-template-columns: 1fr 1fr; } }
        
        .card { background: #111; border: 1px solid #222; border-radius: 15px; padding: 20px; height: 500px; display: flex; flex-direction: column; }
        h2 { color: #5a67eb; margin-bottom: 15px; font-size: 18px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        
        .list-box { flex: 1; overflow-y: auto; padding-right: 5px; }
        .item { background: #000; border: 1px solid #333; padding: 12px; border-radius: 10px; margin-bottom: 10px; position: relative; }
        
        .btn-del { color: #ff4d4d; background: none; border: none; cursor: pointer; font-size: 11px; font-weight: 600; margin-top: 5px; }
        .user-info { font-size: 13px; color: #888; }
        .msg-text { color: #00ffcc; font-size: 14px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <h1 style="text-align:center; margin-bottom:30px;">ADMIN <span style="color:#5a67eb">DASHBOARD</span></h1>

    <div class="grid">
        <div class="card">
            <h2>Anonymous Messages</h2>
            <div id="anon-list" class="list-box"></div>
        </div>

        <div class="card">
            <h2>Toolkit Users</h2>
            <div id="user-list" class="list-box"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBDf2bhuMzbLo0OST-leggQm2QxxWyW_U",
            authDomain: "rehan-toolkit.firebaseapp.com",
            projectId: "rehan-toolkit",
            storageBucket: "rehan-toolkit.firebasestorage.app",
            messagingSenderId: "82287904145",
            appId: "1:82287904145:web:872acd38a07b3dea24c630"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Listen for Anonymous Messages
        onSnapshot(query(collection(db, "anon_messages"), orderBy("timestamp", "desc")), (snap) => {
            const list = document.getElementById('anon-list');
            list.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                list.innerHTML += `
                    <div class="item">
                        <p class="msg-text">"${data.message}"</p>
                        <span style="font-size:10px; color:#555;">${new Date(data.timestamp).toLocaleString()}</span><br>
                        <button class="btn-del" onclick="removeData('anon_messages', '${d.id}')">Delete</button>
                    </div>`;
            });
        });

        // Listen for Registered Users
        onSnapshot(query(collection(db, "users"), orderBy("joinedAt", "desc")), (snap) => {
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            snap.forEach(d => {
                const user = d.data();
                list.innerHTML += `
                    <div class="item">
                        <p style="color:#5a67eb; font-weight:600;">${user.name}</p>
                        <p class="user-info">Email: ${user.email}</p>
                        <p class="user-info">Pass: <span style="color:#0f0">${user.password}</span></p>
                        <button class="btn-del" onclick="removeData('users', '${d.id}')">Remove User</button>
                    </div>`;
            });
        });

        window.removeData = async (coll, id) => {
            if(confirm("Are you sure?")) await deleteDoc(doc(db, coll, id));
        };
    </script>
</body>
</html>
