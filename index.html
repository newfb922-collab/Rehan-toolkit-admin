<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rehan Admin | Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #fff5e1 0%, #ffdfa1 100%); min-height: 100vh; color: #333; }
        .hidden { display: none !important; }
        .flex-center { display: flex; justify-content: center; align-items: center; min-height: 100vh; width: 100%; }
        .glass-card { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(15px); border-radius: 24px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); width: 90%; max-width: 500px; text-align: center; margin: 20px auto; border: 1px solid rgba(255,255,255,0.3); }
        .gradient-text { background: linear-gradient(45deg, #d4a017, #8b5a2b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 600; font-size: 24px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); outline: none; background: rgba(255,255,255,0.8); }
        .btn-main { background: linear-gradient(45deg, #d4a017, #b8860b); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; cursor: pointer; font-weight: 600; margin-top: 10px; transition: 0.3s; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 160, 23, 0.3); }
        .nav { width: 100%; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.3); backdrop-filter: blur(10px); }
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .tool-card { background: white; padding: 10px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .tool-card img { width: 100%; height: 90px; object-fit: cover; border-radius: 10px; }
        .btn-del { color: #ff4d4d; cursor: pointer; border: none; background: none; margin-top: 8px; font-weight: 600; font-size: 12px; }
    </style>
</head>
<body>

    <div id="login-screen" class="flex-center">
        <div class="glass-card">
            <h2 class="gradient-text">Admin Login</h2>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="checkLogin()" class="btn-main">Access Dashboard</button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav class="nav">
            <h2 class="gradient-text">Rehan Control</h2>
            <button onclick="location.reload()" style="background:none; border:none; color:red; cursor:pointer; font-weight:600;">Logout</button>
        </nav>

        <div class="glass-card" style="max-width: 800px; text-align: left;">
            <h3 style="margin-bottom:15px;">Add New Tool</h3>
            <input type="text" id="t-name" placeholder="Tool Name (e.g. Web Cloner)">
            <input type="text" id="t-link" placeholder="Tool Vercel URL">
            <input type="text" id="t-img-url" placeholder="Paste Image URL (from Google)">
            <button id="add-btn" onclick="uploadTool()" class="btn-main">Push to Toolkit</button>
        </div>

        <div class="glass-card" style="max-width: 800px; text-align: left;">
            <h3>Active Tools</h3>
            <div id="tools-list" class="tools-grid">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBDf2bhuMzbLo0OST-leggQm2QxxWyW_U",
            authDomain: "rehan-toolkit.firebaseapp.com",
            projectId: "rehan-toolkit",
            storageBucket: "rehan-toolkit.firebasestorage.app",
            messagingSenderId: "82287904145",
            appId: "1:82287904145:web:872acd38a07b3dea24c630"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.checkLogin = function() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "admin" && p === "admin") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadTools();
            } else { alert("Invalid Credentials!"); }
        }

        window.uploadTool = async function() {
            const name = document.getElementById('t-name').value;
            const link = document.getElementById('t-link').value;
            const img = document.getElementById('t-img-url').value;
            const btn = document.getElementById('add-btn');

            if(!name || !link || !img) return alert("All fields are required!");
            btn.disabled = true; btn.innerText = "Processing...";

            try {
                await addDoc(collection(db, "tools"), { name, link, image: img, timestamp: Date.now() });
                document.getElementById('t-name').value = "";
                document.getElementById('t-link').value = "";
                document.getElementById('t-img-url').value = "";
                alert("Success: Tool Added!");
            } catch (e) { alert("Firebase Error: " + e.message); }
            btn.disabled = false; btn.innerText = "Push to Toolkit";
        }

        function loadTools() {
            const q = query(collection(db, "tools"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('tools-list');
                list.innerHTML = "";
                snapshot.forEach((docData) => {
                    const tool = docData.data();
                    list.innerHTML += `
                        <div class="tool-card">
                            <img src="${tool.image}" onerror="this.src='https://via.placeholder.com/150?text=Invalid+Link'">
                            <h4 style="font-size:13px; margin-top:5px; white-space:nowrap; overflow:hidden;">${tool.name}</h4>
                            <button onclick="deleteTool('${docData.id}')" class="btn-del">REMOVE</button>
                        </div>
                    `;
                });
            });
        }

        window.deleteTool = async (id) => { if(confirm("Delete this tool forever?")) await deleteDoc(doc(db, "tools", id)); }
    </script>
</body>
</html>
